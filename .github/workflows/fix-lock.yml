name: Fix Lockfile
on: push
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install poetry
        run: pipx install poetry
      - name: Fix lock
        run: |
          poetry lock --no-update
          git config --global user.name 'CAPE-Bot'
          git config --global user.email 'bot@cape.io'
          git add poetry.lock
          git commit -m "Auto-fix poetry.lock hash"
          git push